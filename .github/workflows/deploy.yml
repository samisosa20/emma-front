name: CI/CD Fiona Front

on:
  push:
    branches: ["main"]

jobs:
  # 1. Build & Push
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Inyectamos la API_URL en tiempo de BUILD para que se queme en el cliente estático
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fiona-front:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  # 2. Deploy en Producción
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            CONTAINER="fiona_front"
            IMAGE="${{ secrets.DOCKER_USERNAME }}/fiona-front:latest"
            PORT_EXT="${{ secrets.NEXT_PUBLIC_PORT || '3030' }}" # Puerto externo (default 3030)

            echo "=== Actualizando Imagen ==="
            docker pull $IMAGE

            echo "=== Reiniciando Contenedor ==="
            docker stop $CONTAINER || true
            docker rm $CONTAINER || true

            docker run -d \
              --name $CONTAINER \
              --restart unless-stopped \
              --cpus="1.5" \
              --memory="1g" \
              -p ${PORT_EXT}:3030 \
              -e PORT=3030 \
              -e NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              -e NEXT_PUBLIC_INTERNAL_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              $IMAGE

            echo "=== Limpieza ==="
            docker image prune -f
